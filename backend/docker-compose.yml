version: '3.9'

services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:15-alpine
    container_name: traveloop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: traveloop
      POSTGRES_PASSWORD: traveloop_pass
      POSTGRES_DB: traveloop_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traveloop -d traveloop_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (Sessions + Bull Queues + Cache) ──
  redis:
    image: redis:7-alpine
    container_name: traveloop_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── pgAdmin (Dev Only) ──
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: traveloop_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@traveloop.app
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
